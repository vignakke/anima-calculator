<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>More Qi Calculator</title>
<style>
  :root {
    --bg:        #080d15;
    --bg-glow:   #122236;
    --card:      #0f1a28;
    --card-2:    #0b1420;
    --inset:     #0a121d;
    --border:    #1e2e42;
    --border-2:  #2a3e58;
    --text:      #e6eef7;
    --muted:     #7990a8;
    --faint:     #4f6378;
    --accent:    #45c4ff;
    --accent-2:  #8ad8ff;
    --good:      #4ade80;
    --good-bg:   rgba(74,222,128,0.12);
    --warn:      #fbbf24;
    --bad:       #fb7185;
    --bad-bg:    rgba(251,113,133,0.10);
    --radius:    16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background:
      radial-gradient(1100px 600px at 50% -15%, var(--bg-glow) 0%, transparent 55%),
      var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 56px 24px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    width: 100%;
    max-width: 1060px;
    display: grid;
    grid-template-columns: 1fr 470px;
    gap: 20px;
    align-items: start;
  }

  /* ---------- header ---------- */
  header { grid-column: 1 / -1; text-align: center; }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 13px;
  }
  .orb {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 35%, #d6f3ff 0%, #5cc8ff 42%, #1c74b4 100%);
    animation: breathe 3.6s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 7px 1px rgba(69,196,255,.5), 0 0 16px 4px rgba(69,196,255,.18); transform: scale(1); }
    50%      { box-shadow: 0 0 13px 3px rgba(138,216,255,.7), 0 0 30px 9px rgba(69,196,255,.28); transform: scale(1.05); }
  }
  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.2px; }
  h1 b { color: var(--accent); font-weight: 700; }
  .sub { margin-top: 7px; color: var(--muted); font-size: 14px; }

  /* ---------- card ---------- */
  .card {
    background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 26px;
    box-shadow: 0 24px 60px -28px rgba(0,0,0,.7);
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  label {
    display: block;
    font-size: 11.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .input {
    position: relative;
  }
  input {
    width: 100%;
    padding: 13px 14px;
    background: var(--inset);
    border: 1px solid var(--border);
    border-radius: 11px;
    color: var(--text);
    font-size: 17px;
    font-weight: 600;
    font-family: inherit;
    transition: border-color .15s, box-shadow .15s;
  }
  input::placeholder { color: var(--faint); font-weight: 500; }
  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(69,196,255,.14);
  }
  .hint-inline { font-size: 12px; color: var(--faint); margin-top: 7px; }
  .err { font-size: 12.5px; color: var(--bad); margin-top: 7px; min-height: 0; }

  .rule { height: 1px; background: var(--border); margin: 24px 0; }

  /* ---------- result ---------- */
  .result { text-align: center; }
  .result .cap {
    font-size: 11.5px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--muted); margin-bottom: 12px;
  }
  .result .big {
    font-size: 44px; font-weight: 800; letter-spacing: -1px;
    color: var(--accent); line-height: 1;
    word-break: break-word;
    text-shadow: 0 0 26px rgba(69,196,255,.35);
  }
  .result .empty {
    font-size: 16px; font-weight: 500; color: var(--faint);
    text-shadow: none; letter-spacing: 0;
  }

  /* you have / you need */
  .compare {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 22px;
  }
  .compare .box {
    background: var(--inset); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 12px; text-align: center;
  }
  .compare .box .k {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .6px; color: var(--muted); margin-bottom: 6px;
  }
  .compare .box .v { font-size: 20px; font-weight: 700; word-break: break-word; }

  /* verdict */
  .verdict {
    margin-top: 16px; padding: 16px; border-radius: 12px;
    text-align: center; display: none;
  }
  .verdict.show { display: block; }
  .verdict.ok  { background: var(--good-bg); border: 1px solid rgba(74,222,128,.32); }
  .verdict.bad { background: var(--bad-bg);  border: 1px solid rgba(251,113,133,.28); }
  .verdict .line1 { font-size: 13.5px; font-weight: 600; color: var(--muted); }
  .verdict.ok .headline  { color: var(--good); }
  .verdict.bad .headline { color: var(--text); }
  .verdict .headline { font-size: 22px; font-weight: 800; margin-top: 5px; letter-spacing: -.3px; }
  .verdict .ratio { display: block; margin-top: 9px; font-size: 13px; font-weight: 600; color: var(--muted); }

  /* mini rank path inside the verdict */
  .path {
    display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
    gap: 7px; margin-top: 4px;
  }
  .path .n {
    padding: 4px 10px; border-radius: 8px; font-size: 14px; font-weight: 700;
  }
  .path .n.now  { color: var(--text); background: #16273a; border: 1px solid var(--border-2); }
  .path .n.mid  { color: var(--warn); }
  .path .n.goal { color: var(--good); background: var(--good-bg); border: 1px solid rgba(74,222,128,.32); }
  .path .arr { color: var(--faint); font-weight: 700; }

  /* next-level footer row */
  .nextrow {
    display: flex; justify-content: center; align-items: center; gap: 9px;
    margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--border);
    font-size: 14px;
  }
  .nextrow .k { color: var(--muted); }
  .nextrow .v { color: var(--text); font-weight: 700; }

  /* ---------- ranks side panel ---------- */
  .ranks {
    background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px;
    box-shadow: 0 24px 60px -28px rgba(0,0,0,.7);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .ranks .head {
    font-size: 11.5px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .8px; color: var(--muted); text-align: center;
    padding-bottom: 11px;
    border-bottom: 1px solid var(--border);
  }
  /* all ranks fit at once: many columns, tight rows, no scroll */
  .ranks .list {
    column-count: 4; column-gap: 10px;
    padding-top: 9px;
  }
  .r {
    break-inside: avoid;
    display: flex; align-items: center; justify-content: center; gap: 5px;
    padding: 2px 6px; border-radius: 6px;
    font-size: 13px; color: var(--muted); line-height: 1.42;
  }
  .r .nm { font-weight: 600; }
  .r .tg { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; }
  .r.now  { color: var(--text); background: #16273a; }
  .r.now .tg  { color: var(--accent); }
  .r.mid  { color: var(--warn); }
  .r.goal { color: var(--good); background: var(--good-bg); }
  .r.goal .tg { color: var(--good); }
  .ranks .list::-webkit-scrollbar { width: 8px; }
  .ranks .list::-webkit-scrollbar-track { background: transparent; }
  .ranks .list::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

  footer {
    grid-column: 1 / -1;
    text-align: center; color: var(--faint); font-size: 12.5px; margin-top: 4px;
  }

  /* ---------- responsive ---------- */
  @media (max-width: 880px) {
    body { padding: 32px 16px; }
    .app { grid-template-columns: 1fr; }
  }
  @media (max-width: 460px) {
    .ranks .list { column-count: 3; }
  }
</style>
</head>
<body>
  <div class="app">

    <header>
      <div class="brand">
        <span class="orb"></span>
        <h1>More <b>Qi</b> Calculator</h1>
      </div>
      <p class="sub">How much Anima to level up your More Qi upgrade.</p>
    </header>

    <div class="card">
        <div class="grid2">
          <div class="field">
            <label for="current">Current level</label>
            <div class="input"><input type="number" id="current" placeholder="252" min="0" inputmode="numeric"></div>
          </div>
          <div class="field">
            <label for="target">Target level</label>
            <div class="input"><input type="number" id="target" placeholder="253" min="1" inputmode="numeric"></div>
          </div>
        </div>

        <div class="field" style="margin-top:16px">
          <label for="anima">Anima you have <span style="text-transform:none;color:var(--faint);font-weight:500">(optional)</span></label>
          <div class="input"><input type="text" id="anima" placeholder="e.g. 42.7Usg" autocomplete="off"></div>
          <div class="err" id="err"></div>
        </div>

        <div class="rule"></div>

        <div class="result">
          <div class="cap">Total cost to reach target</div>
          <div class="big empty" id="total">Enter your levels above</div>
        </div>

        <div class="compare" id="compare" style="display:none">
          <div class="box">
            <div class="k">You have</div>
            <div class="v" id="have">&mdash;</div>
          </div>
          <div class="box">
            <div class="k">You need</div>
            <div class="v" id="need">&mdash;</div>
          </div>
        </div>

        <div class="verdict" id="verdict"></div>

        <div class="nextrow">
          <span class="k">Next level (<span id="nextLvl">&ndash;</span>) costs</span>
          <span class="v" id="nextCost">&mdash;</span>
        </div>
    </div>

    <aside class="ranks">
      <div class="head">All ranks &mdash; small to big</div>
      <div class="list" id="rankList"></div>
    </aside>

    <footer>Costs and suffixes match the in-game values.</footer>
  </div>

<script>
// ============ Data from the spreadsheet ============
// Named suffixes, group index 0..101 (0 = no suffix, up to "Cg").
const NAMED = ["", "K","M","B","T","Qa","Qi","Sx","Sp","Oc","No","Dc","Ud","Dd","Td","Qad","Qid","Sxd","Spd","Ocd","Nod","Vg","Uvg","Dvg","Tvg","Qatvg","Qivg","Sxvg","Spvg","Ocvg","Novg","Tg","Utg","Dtg","Ttg","Qatg","Qitg","Sxtg","Sptg","Octg","Notg","Qag","Uqag","Dqag","Tqag","Qaqag","Qiqag","Sxqag","Spqag","Ocqag","Noqag","Qig","Uqig","Dqig","Tqig","Qaqig","Qiqig","Sxqig","Spqig","Ocqig","Noqig","Sg","Usg","Dsg","Tsg","Qasg","Qisg","Sxsg","Spsg","Ocsg","Nosg","Spg","Uspg","Dspg","Tspg","Qaspg","Qispg","Sxspg","Spspg","Ocspg","Nospg","Ocg","Uocg","Docg","Tocg","Qaocg","Qiocg","Sxocg","Spocg","Ococg","Noocg","Nog","Unog","Dnog","Tnog","Qanog","Qinog","Sxnog","Spnog","Ocnog","Nonog","Cg"];

function suffixForGroup(g) {
  if (g < 0) return "";
  if (g < NAMED.length) return NAMED[g];
  return "E" + g;                      // beyond Cg the game uses E-notation
}
const SUFFIX_EXP = {};
NAMED.forEach((s, i) => { if (s) SUFFIX_EXP[s.toLowerCase()] = i * 3; });

// ============ Cost maths (log10 space for huge numbers) ============
const LOG_C = Math.log10(681);
const LOG_R = Math.log10(6.10016);
const RATE  = 6.10016;

const logCost = L => LOG_C + (L - 4) * LOG_R;

function logSumCosts(from, to) {           // log10 of summed cost, levels from+1..to
  if (to <= from) return -Infinity;
  const N = to - from;
  const r = 1 / RATE;
  return logCost(to) + Math.log10((1 - Math.pow(r, N)) / (1 - r));
}
function logSub(a, b) {                     // log10(A-B), A>=B
  if (b > a) [a, b] = [b, a];
  const d = b - a;
  return d < -15 ? a : a + Math.log10(1 - Math.pow(10, d));
}
function fmt(v) {                           // "X.XX"+suffix
  if (!isFinite(v)) return "&mdash;";
  const g = Math.floor(v / 3);
  return (Math.pow(10, v - 3 * g)).toFixed(2) + suffixForGroup(g);
}

// ============ Parse Anima input ============
function readAnima() {
  const raw = document.getElementById('anima').value.trim();
  if (!raw) return null;
  if (/^[0-9]*\.?[0-9]+(e[+-]?[0-9]+)?$/i.test(raw)) {
    const n = parseFloat(raw);
    return (isFinite(n) && n > 0) ? { log: Math.log10(n) } : { error: true };
  }
  const m = raw.match(/^([0-9]*\.?[0-9]+)\s*([A-Za-z]+[0-9]*)$/);
  if (!m) return { error: true };
  const mant = parseFloat(m[1]), suf = m[2];
  if (!(isFinite(mant) && mant > 0)) return { error: true };
  if (suf.toLowerCase() in SUFFIX_EXP) return { log: Math.log10(mant) + SUFFIX_EXP[suf.toLowerCase()] };
  const em = suf.match(/^[eE]([0-9]+)$/);
  if (em) return { log: Math.log10(mant) + parseInt(em[1], 10) * 3 };
  return { error: true };
}

// ============ Render ============
const $ = id => document.getElementById(id);

function update() {
  const cur = parseInt($('current').value, 10);
  const tgt = parseInt($('target').value, 10);
  const err = $('err');
  const total = $('total');
  const compare = $('compare');
  const verdict = $('verdict');
  err.textContent = '';

  $('nextLvl').textContent = isFinite(cur) ? cur + 1 : '–';

  // next-level cost (needs only current)
  $('nextCost').innerHTML = isFinite(cur) && cur >= 0 ? fmt(logCost(cur + 1)) : '&mdash;';

  // ---- empty / invalid states ----
  if (!isFinite(cur) || cur < 0 || !isFinite(tgt)) {
    total.className = 'big empty';
    total.textContent = 'Enter your levels above';
    compare.style.display = 'none';
    verdict.className = 'verdict';
    renderRanks(null, null);
    return;
  }
  if (tgt <= cur) {
    total.className = 'big empty';
    total.textContent = '—';
    err.textContent = 'Target level must be higher than current level.';
    compare.style.display = 'none';
    verdict.className = 'verdict';
    renderRanks(null, null);
    return;
  }

  // ---- total cost ----
  const logTotal = logSumCosts(cur, tgt);
  const goalGroup = Math.floor(logTotal / 3);
  total.className = 'big';
  total.innerHTML = fmt(logTotal);

  // ---- anima comparison ----
  const anima = readAnima();
  if (anima === null) {
    compare.style.display = 'none';
    verdict.className = 'verdict';
    renderRanks(null, goalGroup);
    return;
  }
  if (anima.error) {
    compare.style.display = 'none';
    verdict.className = 'verdict';
    err.textContent = 'Couldn\u2019t read that. Try "42.7Usg" or "5e66".';
    renderRanks(null, goalGroup);
    return;
  }

  const logA = anima.log;
  const haveGroup = Math.floor(logA / 3);
  compare.style.display = 'grid';
  $('have').innerHTML = fmt(logA);
  $('need').innerHTML = fmt(logTotal);

  if (logA >= logTotal) {
    verdict.className = 'verdict ok show';
    verdict.innerHTML =
      '<div class="line1">You can afford it</div>' +
      '<div class="headline">Left over: ' + fmt(logSub(logA, logTotal)) + '</div>';
  } else {
    verdict.className = 'verdict bad show';
    verdict.innerHTML =
      '<div class="line1">Ranks left to farm</div>' +
      buildPath(haveGroup, goalGroup) +
      '<span class="ratio">' + fmt(logTotal - logA) + '&times; more Anima needed</span>';
  }
  renderRanks(haveGroup, goalGroup);
}

// mini rank path shown in the verdict: now > mid > … > goal
function buildPath(g0, g1) {
  const node = (g, c) => '<span class="n ' + c + '">' + (suffixForGroup(g) || 'plain') + '</span>';
  const ARR = '<span class="arr">&rsaquo;</span>';
  let parts = [];
  if (g0 === g1) return '<div class="path">' + node(g0, 'goal') + '</div>';
  if (g1 - g0 <= 5) {
    for (let g = g0; g <= g1; g++) parts.push(node(g, g === g0 ? 'now' : g === g1 ? 'goal' : 'mid'));
  } else {
    parts = [node(g0,'now'), node(g0+1,'mid'), '<span class="arr">&hellip;</span>', node(g1-1,'mid'), node(g1,'goal')];
  }
  return '<div class="path">' + parts.join(ARR) + '</div>';
}

// full rank reference, all ranks in order, 2 columns, current + goal highlighted
function renderRanks(haveGroup, goalGroup) {
  const box = $('rankList');
  let maxG = 101;
  if (goalGroup != null) maxG = Math.max(maxG, goalGroup);
  if (haveGroup != null) maxG = Math.max(maxG, haveGroup);

  const lo = (haveGroup != null && goalGroup != null) ? Math.min(haveGroup, goalGroup) : Infinity;
  const hi = (haveGroup != null && goalGroup != null) ? Math.max(haveGroup, goalGroup) : -Infinity;

  let html = '';
  for (let g = 1; g <= maxG; g++) {
    let cls = '', tag = '';
    if (g === haveGroup)      { cls = ' now';  tag = '<span class="tg">you</span>'; }
    else if (g === goalGroup) { cls = ' goal'; tag = '<span class="tg">goal</span>'; }
    else if (g > lo && g < hi){ cls = ' mid'; }
    html += '<div class="r' + cls + '" data-g="' + g + '"><span class="nm">' + suffixForGroup(g) + '</span>' + tag + '</div>';
  }
  box.innerHTML = html;

  const focus = haveGroup != null ? haveGroup : goalGroup;
  if (focus != null) {
    const el = box.querySelector('[data-g="' + focus + '"]');
    if (el) {
      const er = el.getBoundingClientRect(), pr = box.getBoundingClientRect();
      box.scrollTop += (er.top - pr.top) - box.clientHeight / 2 + el.clientHeight / 2;
    }
  }
}

['current','target','anima'].forEach(id => $(id).addEventListener('input', update));
update();
</script>
</body>
</html>
