<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>More Qi Cost Calculator</title>
<style>
  :root {
    --bg: #060b12;
    --panel: #0d1825;
    --line: #1c2c3e;
    --blue: #38bdf8;
    --blue-soft: #7dd3fc;
    --text: #cdd9e5;
    --muted: #6b8299;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(900px 500px at 50% -10%, #11243a 0%, transparent 60%),
      var(--bg);
    color: var(--text);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 20px;
  }
  .wrap { width: 100%; max-width: 520px; }

  header { margin-bottom: 28px; text-align: center; }
  .title {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }
  /* Real animated glow: the flame orb softly breathes */
  .orb {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 38%, #bdecff 0%, #38bdf8 45%, #1a6fb0 100%);
    position: relative;
    animation: breathe 3.4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% {
      box-shadow: 0 0 8px 1px rgba(56,189,248,0.45),
                  0 0 18px 4px rgba(56,189,248,0.20);
      transform: translateY(0) scale(1);
    }
    50% {
      box-shadow: 0 0 14px 3px rgba(125,211,252,0.70),
                  0 0 34px 10px rgba(56,189,248,0.30);
      transform: translateY(-1px) scale(1.04);
    }
  }
  h1 {
    font-size: 25px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: #eaf4fb;
  }
  h1 span { color: var(--blue); }
  .tag {
    margin-top: 8px;
    font-size: 13.5px;
    color: var(--muted);
  }

  .panel {
    background: linear-gradient(180deg, var(--panel) 0%, #0a131e 100%);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 24px;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin-bottom: 7px;
    text-align: center;
  }
  input, select {
    width: 100%;
    padding: 12px 13px;
    background: #07101a;
    border: 1px solid var(--line);
    border-radius: 9px;
    color: #eaf4fb;
    font-size: 16px;
    font-weight: 500;
    text-align: center;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(56,189,248,0.12);
  }
  select { cursor: pointer; }

  .anima-input { display: grid; grid-template-columns: 1fr 130px; gap: 10px; }

  .divider { height: 1px; background: var(--line); margin: 22px 0; }

  .out-main { text-align: center; }
  .out-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .out-value {
    font-size: 40px;
    font-weight: 700;
    color: var(--blue);
    line-height: 1.05;
    word-break: break-word;
  }
  .out-note { margin-top: 8px; font-size: 13px; color: var(--muted); }

  /* centered have/need pair */
  .pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 22px;
  }
  .pair .cell {
    text-align: center;
    padding: 14px 10px;
    background: #07101a;
    border: 1px solid var(--line);
    border-radius: 10px;
  }
  .pair .cell .lbl {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .pair .cell .num { font-size: 19px; font-weight: 700; color: #eaf4fb; word-break: break-word; }

  .stat-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    padding: 11px 0;
    border-top: 1px solid var(--line);
    font-size: 14px;
    text-align: center;
  }
  .stat-row .k { color: var(--muted); }
  .stat-row .v { color: #eaf4fb; font-weight: 600; }

  .verdict {
    margin-top: 16px;
    padding: 14px 15px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    display: none;
  }
  .verdict.ok { display: block; background: rgba(34,197,124,0.10); border: 1px solid rgba(34,197,124,0.35); color: #54d99a; }
  .verdict.bad { display: block; background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.30); color: #f49aa0; }
  .verdict .big { display: block; font-size: 24px; margin-top: 4px; }
  .verdict .sub { display: block; font-size: 13px; font-weight: 500; opacity: 0.85; margin-top: 8px; }

  /* rank chain: current -> ranks left -> goal */
  .chain {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }
  .chain .node {
    padding: 4px 9px;
    border-radius: 7px;
    font-size: 15px;
    font-weight: 700;
  }
  .chain .now  { color: #eaf4fb; background: #0f2233; border: 1px solid var(--line); }
  .chain .todo { color: #f0b352; }                       /* ranks still to farm */
  .chain .goal { color: #54d99a; background: rgba(34,197,124,0.12); border: 1px solid rgba(34,197,124,0.35); }
  .chain .sep  { color: var(--muted); font-weight: 600; }

  .msg { font-size: 13px; color: #f49aa0; margin-top: 8px; min-height: 0; }

  footer {
    margin-top: 20px;
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.6;
  }
  footer code {
    background: #07101a;
    border: 1px solid var(--line);
    padding: 1px 6px;
    border-radius: 5px;
    color: var(--blue-soft);
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">
        <div class="orb"></div>
        <h1>More <span>Qi</span> Calculator</h1>
      </div>
      <p class="tag">Work out the Anima cost to level your More Qi upgrade.</p>
    </header>

    <div class="panel">
      <div class="grid2">
        <div class="field">
          <label>Current level</label>
          <input type="number" id="current" placeholder="252" min="0">
        </div>
        <div class="field">
          <label>Target level</label>
          <input type="number" id="target" placeholder="253" min="1">
        </div>
      </div>

      <div class="field">
        <label>Anima you have (optional)</label>
        <input type="text" id="anima" placeholder="e.g. 42.7Usg">
        <div class="msg" id="msg"></div>
      </div>

      <div class="divider"></div>

      <div class="out-main">
        <div class="out-label">Total cost to reach target</div>
        <div class="out-value" id="totalCost">&mdash;</div>
      </div>

      <!-- shown only when Anima is entered -->
      <div class="pair" id="pair" style="display:none">
        <div class="cell">
          <div class="lbl">You have</div>
          <div class="num" id="yourAnima">&mdash;</div>
        </div>
        <div class="cell">
          <div class="lbl">You need</div>
          <div class="num" id="needTotal">&mdash;</div>
        </div>
      </div>

      <div class="verdict" id="verdict"></div>

      <div style="margin-top:18px">
        <div class="stat-row">
          <span class="k">Next level (<span id="nextLvl">253</span>) costs</span>
          <span class="v" id="nextCost">&mdash;</span>
        </div>
      </div>
    </div>

    <footer>
      Costs and suffixes match the in-game values.
    </footer>
  </div>

<script>
// ---- Data straight from the spreadsheet ----
// Named suffixes, index 0..101 (index 0 = no suffix, up to "Cg").
const NAMED = ["", "K", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc", "Ud", "Dd", "Td", "Qad", "Qid", "Sxd", "Spd", "Ocd", "Nod", "Vg", "Uvg", "Dvg", "Tvg", "Qatvg", "Qivg", "Sxvg", "Spvg", "Ocvg", "Novg", "Tg", "Utg", "Dtg", "Ttg", "Qatg", "Qitg", "Sxtg", "Sptg", "Octg", "Notg", "Qag", "Uqag", "Dqag", "Tqag", "Qaqag", "Qiqag", "Sxqag", "Spqag", "Ocqag", "Noqag", "Qig", "Uqig", "Dqig", "Tqig", "Qaqig", "Qiqig", "Sxqig", "Spqig", "Ocqig", "Noqig", "Sg", "Usg", "Dsg", "Tsg", "Qasg", "Qisg", "Sxsg", "Spsg", "Ocsg", "Nosg", "Spg", "Uspg", "Dspg", "Tspg", "Qaspg", "Qispg", "Sxspg", "Spspg", "Ocspg", "Nospg", "Ocg", "Uocg", "Docg", "Tocg", "Qaocg", "Qiocg", "Sxocg", "Spocg", "Ococg", "Noocg", "Nog", "Unog", "Dnog", "Tnog", "Qanog", "Qinog", "Sxnog", "Spnog", "Ocnog", "Nonog", "Cg"];

// Suffix for a given group index (group = floor(log10 / 3)).
// 0..101 are named; 102+ are "E"+index, exactly like the sheet.
function suffixForGroup(g) {
  if (g < 0) return "";
  if (g < NAMED.length) return NAMED[g];
  return "E" + g;
}
// Reverse: suffix string -> exponent (group * 3). Used for parsing input.
const SUFFIX_EXP = {};
NAMED.forEach((s, i) => { if (s) SUFFIX_EXP[s.toLowerCase()] = i * 3; });

// ---- Cost maths (done in log10 space to survive huge numbers) ----
const LOG_C   = Math.log10(681);       // base coefficient
const LOG_R   = Math.log10(6.10016);   // growth per level
const RATE    = 6.10016;

function logCost(L) { return LOG_C + (L - 4) * LOG_R; }

// log10 of the summed cost for levels (from+1 .. to), via geometric series.
function logSumCosts(from, to) {
  if (to <= from) return -Infinity;
  const N = to - from;
  const maxLog = logCost(to);            // largest term
  const r = 1 / RATE;
  const ratio = (1 - Math.pow(r, N)) / (1 - r);
  return maxLog + Math.log10(ratio);
}

// Format a log10 value as "X.XX" + suffix, matching the sheet.
function fmt(log10v) {
  if (!isFinite(log10v)) return "&mdash;";
  const g = Math.floor(log10v / 3);
  const mantissa = Math.pow(10, log10v - 3 * g);
  return mantissa.toFixed(2) + suffixForGroup(g);
}

// log10 of (A - B) given their log10 values, with A >= B. Stays accurate for huge numbers.
function logSub(logA, logB) {
  if (logB > logA) return logSub(logB, logA); // safety
  const d = logB - logA;            // <= 0
  if (d < -15) return logA;          // B is negligible vs A
  return logA + Math.log10(1 - Math.pow(10, d));
}

// ---- Anima input ----
// Parse text like "42.7Usg", "42.7 Usg", "5e66", or "1234".
// Returns { log } on success, { error:true } if a suffix was typed but not recognised, or null if empty.
function readAnima() {
  const raw = document.getElementById('anima').value.trim();
  if (!raw) return null;

  // plain number or scientific (e.g. 5e66)
  if (/^[0-9]*\.?[0-9]+(e[+-]?[0-9]+)?$/i.test(raw)) {
    const n = parseFloat(raw);
    if (!isFinite(n) || n <= 0) return { error: true };
    return { log: Math.log10(n) };
  }

  // number + suffix
  const m = raw.match(/^([0-9]*\.?[0-9]+)\s*([A-Za-z]+[0-9]*)$/);
  if (!m) return { error: true };
  const mantissa = parseFloat(m[1]);
  const suf = m[2];
  if (!isFinite(mantissa) || mantissa <= 0) return { error: true };

  // named suffix?
  if (suf.toLowerCase() in SUFFIX_EXP) {
    return { log: Math.log10(mantissa) + SUFFIX_EXP[suf.toLowerCase()] };
  }
  // E-notation suffix like "E130"
  const em = suf.match(/^[eE]([0-9]+)$/);
  if (em) return { log: Math.log10(mantissa) + parseInt(em[1], 10) * 3 };

  return { error: true };
}

// ---- Update loop ----
function update() {
  const cur = parseInt(document.getElementById('current').value, 10);
  const tgt = parseInt(document.getElementById('target').value, 10);
  const msg = document.getElementById('msg');
  const verdict = document.getElementById('verdict');
  msg.textContent = '';

  document.getElementById('nextLvl').textContent = isFinite(cur) ? cur + 1 : '?';

  const totalEl = document.getElementById('totalCost');
  const nextEl  = document.getElementById('nextCost');
  const pair    = document.getElementById('pair');

  if (!isFinite(cur) || cur < 0) {
    totalEl.innerHTML = '&mdash;';
    nextEl.innerHTML = '&mdash;';
    pair.style.display = 'none';
    verdict.className = 'verdict'; return;
  }

  nextEl.innerHTML = fmt(logCost(cur + 1));

  if (!isFinite(tgt) || tgt <= cur) {
    totalEl.innerHTML = '&mdash;';
    pair.style.display = 'none';
    verdict.className = 'verdict'; return;
  }

  const logTotal = logSumCosts(cur, tgt);
  totalEl.innerHTML = fmt(logTotal);

  // Anima comparison
  const anima = readAnima();

  if (anima === null) {              // empty
    pair.style.display = 'none';
    verdict.className = 'verdict';
    return;
  }
  if (anima.error) {                 // typed something unrecognised
    pair.style.display = 'none';
    msg.textContent = 'Couldn\'t read that. Try like "42.7Usg" or "5e66".';
    verdict.className = 'verdict';
    return;
  }

  const logAnima = anima.log;
  pair.style.display = 'grid';
  document.getElementById('yourAnima').innerHTML = fmt(logAnima);
  document.getElementById('needTotal').innerHTML = fmt(logTotal);

  if (logAnima >= logTotal) {
    verdict.className = 'verdict ok';
    verdict.innerHTML = 'You can afford it.<span class="big">Left over: ' +
      fmt(logSub(logAnima, logTotal)) + '</span>';
  } else {
    const g0 = Math.floor(logAnima / 3);   // current rank tier
    const g1 = Math.floor(logTotal / 3);   // goal rank tier
    const ratioLog = logTotal - logAnima;
    verdict.className = 'verdict bad';
    verdict.innerHTML =
      buildChain(g0, g1) +
      '<span class="sub">(' + fmt(ratioLog) + '&times; more Anima to farm)</span>';
  }
}

// Build the rank chain: current rank, the ranks left to farm, then the goal.
function buildChain(g0, g1) {
  const node = (g, cls) =>
    '<span class="node ' + cls + '">' + (suffixForGroup(g) || 'plain') + '</span>';
  const SEP = '<span class="sep">&rsaquo;</span>';

  if (g0 === g1) {                         // same rank, just need more
    return '<div class="chain">' + node(g0, 'goal') + '</div>';
  }

  let parts = [];
  const span = g1 - g0;
  if (span <= 6) {                         // short enough: show every rank
    for (let g = g0; g <= g1; g++) {
      parts.push(node(g, g === g0 ? 'now' : g === g1 ? 'goal' : 'todo'));
    }
  } else {                                 // too many: current › next › … › goal
    parts.push(node(g0, 'now'));
    parts.push(node(g0 + 1, 'todo'));
    parts.push('<span class="sep">&hellip;</span>');
    parts.push(node(g1 - 1, 'todo'));
    parts.push(node(g1, 'goal'));
  }
  return '<div class="chain">' + parts.join(SEP) + '</div>';
}

['current','target','anima'].forEach(id =>
  document.getElementById(id).addEventListener('input', update));
update();
</script>
</body>
</html>
